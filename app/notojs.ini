# JavaScript and native module search paths.
# jspath resolves JavaScript modules; sopath resolves native .so modules.
# [engine]
# jspath = /usr/local/share/notojs/modules
# sopath = /usr/local/lib/notojs/modules

# Global runtime options used by server-side JavaScript helpers.
# agent sets the HTTP user agent; prefix is used for relative fetch requests.
# [global]
# agent = curl/8.7.1
# prefix = http://127.0.0.1

# Workspace storage configuration.
# path is the notebook workspace; lmdb sets the database map size.
# [folder]
# path = /usr/local/share/notojs/workspace
# lmdb = 256mb

# Documentation module configuration.
# suite points to the generated documentation suite shared library.
# [module:doc]
# suite = /usr/local/lib/notojs/libdoc.so

# Filesystem module mounts.
# Each key is a virtual path and each value is native_path,mode where mode is ro or rw.
# [module:fs]
# /tmp = /tmp,rw

# Server-side plugin search path.
# Individual plugins are enabled with [plugin:NAME] sections.
# [plugin]
# path = /usr/local/lib/notojs/plugins

# HTTP server configuration.
# bind is required; base sets the URL prefix; threads is HTTP_threads,sync_IO_threads.
[server]
bind = 127.0.0.1:8000
# base = /
# threads = 2,1
# log = /var/log/notojs.log

# Periodic notebook execution schedule.
# Keys are intervals that divide 60 minutes; values are notebooks to execute.
# [timers]
# 01m = 01m.notojs
# 02m = 02m.notojs
# 03m = 03m.notojs
# 04m = 04m.notojs
# 05m = 05m.notojs
# 06m = 06m.notojs
# 10m = 10m.notojs
# 12m = 12m.notojs
# 15m = 15m.notojs
# 20m = 20m.notojs
# 30m = 30m.notojs
# 60m = 60m.notojs

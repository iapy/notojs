[cell]
blur = Escape
clear = ctrl KeyL
next = +apple alt ArrowDown
next = -apple ctrl shift ArrowDown
previous = +apple alt ArrowUp
previous = -apple ctrl shift ArrowUp
run = +apple meta Enter
run = -apple ctrl Enter

[preview]
close = Escape
close = +apple meta KeyP
close = -apple ctrl KeyP
slides = +apple meta Enter
slides = -apple ctrl Enter

[sidebar]
close = Escape
close-file = KeyW
force-close = +apple meta Backslash
force-close = -apple ctrl Backslash
restart-context = +apple meta KeyC
restart-context = -apple ctrl KeyC
restart-kernel = +apple meta KeyK
restart-kernel = -apple ctrl KeyK
save = Enter
search = Backslash
search = IntlBackslash

[toolbar]
clear = ctrl shift KeyL
edit = Enter
run = +apple meta shift Enter
run = -apple ctrl shift Enter
preview = +apple meta KeyP
preview = -apple ctrl KeyP
side = +apple meta Backslash
side = -apple ctrl Backslash

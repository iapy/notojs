class: Headers
docs: Headers
text: |-
  The `Headers` interface of the Fetch API allows you to perform various actions on `Request` and `Response` headers.
  These actions include retrieving, setting, adding to, and removing headers from the list of the request's headers.

  > Implemented on top of `boost::beast::http::fields`.{.info}

  > Implementation details may differ from browser implementations.{.warning}
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/Headers
ctor:
  args:
    -
      []
    -
      - Dict:
          - String
  docs: Headers.constructor
  text: |-
    Creates a new `Headers` object, optionally initialized with values from `arg0`.
methods:
  append:
    args:
      -
        - String
        - String
    docs: Headers.append
    text: |-
      Appends a new value onto an existing header inside a `Headers` object, or adds the header if it does not already exist.

      - `arg0` — header name
      - `arg1` — header value
  delete:
    args:
      -
        - String
    docs: Headers.delete
    text: |-
      Deletes a header from a `Headers` object.

      - `arg0` — header name
  forEach:
    args:
      -
        - Function
      -
        - Function
        - Any
    docs: Headers.forEach
    text: |-
      Executes a provided function once for each key/value pair in this Headers object.

      - `arg0` — Function to execute for each entry in the map. It takes the following arguments:
        - `arg0` — value of the currently visited header value.
        - `arg1` — name of the currently visited header entry.
        - `arg2` — the object that `forEach` is being applied to
      - `arg1` — value to use as `this` when executing `arg0`.
  get:
    args:
      -
        - String
    docs: Headers.get
    text: |-
      Returns a comma-separated `String` of all the values of a header within a `Headers` object with a given name.
  has:
    args:
      -
        - String
    docs: Headers.has
    text: |-
      Returns a boolean stating whether a `Headers` object contains a certain header.
  keys:
    args:
      -
        []
    docs: Headers.keys
    text: |-
      Returns an iterator allowing you to go through all keys of the key/value pairs contained in this object.
  set:
    args:
      -
        - String
        - String
    docs: Headers.set
    text: |-
      Sets a new value for an existing header inside a Headers object, or adds the header if it does not already exist.
  toJSON:
    args:
      -
        []
    docs: Headers.toJSON
    text: |-
      Headers.toJSON
      Returns object mapping header names to values:
      - `key` — `String`, header name
      - `value` — `String`, header value
  values:
    args:
      -
        []
    docs: Headers.values
    text: |-
      Returns an iterator allowing you to go through all values of the key/value pairs contained in this object.

text: |-
  Performs an HTTP request asynchronously.

  - `arg0` — request input (`Request`, `URL`, or URL string)
  - `arg1` — optional `Request.Config`

  Returns a `Promise` resolving to a `Response` that  contains the fully resolved request, including headers and body.

  The request always respects `Request.Config.timeout` (default: 10 seconds). If the timeout is exceeded, the promise is rejected with `InternalError` (`Request timed out`).
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/fetch
---
function: print
args:
  -
    - Tail:
        - 0
        - Any
text: |-
  Appends values to the current notebook cell output.

  Each call creates one output row. Passing multiple arguments renders those values in the same row, so they can appear inline or side by side depending on their value types and the selected layout.

  ```javascript
  print('Hello, world!');
  print('Hello, ', 'world!');
  print({ score: 42 });
  ```

  `print` returns `undefined`. Calling it without arguments does nothing.

  ##### Rendered values

  Primitive values are rendered as text.

  Objects of registered types are rendered by notebook output handlers. The built-in handlers include:
  - `HTML`
  - `Markdown`
  - `Image`
  - `SVG`
  - `XML`

  Objects of other types are shown as expandable JSON.

  ##### Multiple values

  Multiple arguments are kept together as one output row:

  ```javascript
  import { html } from 'noto:core';
  const block = (c, t) => html(`
    <div style="background-color: ${c}; padding: 3em; text-align: center">${t}</div>
  `);

  print(
    block('#9CC6DE', 'left'),
    block('#B49CDE', 'center'),
    block('#DEB49C', 'right')
  );
  ```

  Adjacent primitive or plain object values may be rendered inline within a text block.
  Values with dedicated renderers, such as `HTML`, `Markdown`, `Image`, `XML`, or renderering extensions, receive their own output block.

  ##### Layouts

  `print` is also a proxy. Accessing a string property returns a print function configured with a grid layout:

  ```javascript
  import { html } from 'noto:core';
  const block = (c, t) => html(`
    <div style="background-color: ${c}; padding: 3em; margin-bottom: 0.5em; text-align: center">${t}</div>
  `);

  print['50% 50%'](
    block('#9CC6DE', '50%'),
    block('#DEB49C', '50%')
  );
  print['50% 25% 25%'](
    block('#9CC6DE', '50%'),
    block('#B49CDE', '25%'),
    block('#DEB49C', '25%')
  );
  ```

  A layout is a space-separated list of column widths. Each width must be a percentage, for example `50%` or `33%`.

  A width can include `/N` to make the column consume `N` rendered blocks before moving to the next column:

  ```javascript
  import { html } from 'noto:core';
  const block = (c, t) => html(`
    <div style="background-color: ${c}; padding: 3em; margin-bottom: 0.5em; text-align: center">${t}</div>
  `);

  print['50%/2'](
    block('#9CC6DE', '50%'),
    block('#DEB49C', '50%')
  );
  print['50%/2'](
    block('#9CC6DE', 'top'),
    block('#B49CDE', 'bottom'),
    block('#DEB49C', '50%')
  );
  ```

  If the layout describes fewer rendered blocks than the call produces, NotoJS adds remaining columns automatically with equal widths based on the unused space.

  ```javascript
  import { html } from 'noto:core';
  const block = (c, t) => html(`
    <div style="background-color: ${c}; padding: 3em; margin-bottom: 0.5em; text-align: center">${t}</div>
  `);

  print['50%'](
    block('#9CC6DE', '50%'),
    block('#DEB49C', '50%')
  );
  print['50%'](
    block('#9CC6DE', '50%'),
    block('#B49CDE', '25%'),
    block('#DEB49C', '25%')
  );
  ```

  Prefix the first layout token with `:` to wrap the row in a slide container:

  ```javascript
  import { markdown } from 'noto:core';
  print[':'](markdown('# Slide 1'));
  print[':'](markdown('# Slide 2'));
  ```

  In browsers that support `requestFullscreen`, slides can be presented as a full-screen slideshow.

  Slideshow mode supports the following keyboard shortcuts:
  - left arrow: move to the previous slide
  - right arrow: move to the next slide
  - escape: exit slideshow mode
  - space: move to the next slide
  - shift + space: move to the previous slide

  Throw `TypeError` if the layout string is invalid.
also:
  - noto:core
  - topic:markdown
  - topic:extensions
---
function: require
args:
  -
    - String
text: |-
  Synchronously loads and executes a legacy **JavaScript** script.
  Unlike imported modules, scripts may (and often do) export functions, constants, and variables directly to global notebook context.

  `arg0` may be one of the following:

  - one of the predefined legacy scripts:
    - `dollar`
    - `console`
    - `mustache`
  - a valid `http` or `https` URL — the script is loaded from that URL.
  - a script configured in `require.config` under the `[scripts]` section — the script is loaded from the configured URL and cached.

  Throws `ReferenceError` if the script cannot be loaded due to a network error, or if it is not found.
  Rethrows any exception from the script.
also:
  - console
  - dollar
  - topic:packages
---
function: require.config
args:
  - []
  -
    - String
text: |-
  Gets or sets the module and script resolver configuration.

  - Without arguments, returns the current configuration.
  - With `arg0`, sets the configuration. The value must be a string in INI format.

  Throws `SyntaxError` if the configuration cannot be parsed.

  > The configuration format is a restricted subset of INI as described in `doc('topic:packages')`.{.warning}
also:
  - topic:packages

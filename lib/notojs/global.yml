    - Markdown
    - Object
text: |-
  Processes the current notebook input or applies a template, depending on the arguments.

  When passed a function as `arg0`, invokes it with the current `globalThis.input` value and stores the result back in `globalThis.input`.
  This is a building block for **NotoJS** pipelines.

  Otherwise, applies a **Mustache** template to the given input.

  - `arg0` — template input
  - `arg1` — values object used for template substitution

  The template is rendered using **Mustache** with `arg0` as the template and `arg1` as the data.

  Returns a value of the same type as `arg0` with the template applied.
also:
  - dollar
  - topic:pipeline

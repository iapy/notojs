class: Storage
docs: Storage
text: |-
  A key–value persistence interface backed by **LMDB**, providing fast, durable storage across executions.
  Unlike the standard browser implementation, it can store any JSON-serializable values — not just strings.

  `Storage` is accessible using **NotoJS** HTTP API.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/Storage
  - topic:api
  - topic:lmdb
  - topic:ui
defs:
  - type: Namespace
    base: String
    docs: Storage.Namespace
    text: |-
      `Storage.Namespace` mimics browser-style `localStorage` domain separation.
      It must be a non-empty string and cannot contain spaces or forward slashes (/).
      Each namespace is stored in a separate **LMDB** database (`sys:storage:namespace`).
  - struct: Config
    fields:
      notebook:
        type: Boolean
        docs: Storage.Config.notebook
        text: |-
          Attach `Storage` instance as `localStorage` to notebook if `true` and to current cell as `false`.
    docs: Storage.Config
    text: |-
      An optional object passed as the second argument to the `Storage.attach` method.
ctor:
  args:
    -
      - Storage.Namespace
  docs: Storage.constructor
  text: |-
    Constructs `Storage` instance using provided namespace.
properties:
  length:
    getter: true
    docs: Storage.length
    text: |-
      Returns an integer representing the number of data items stored in the `Storage` object.
methods:
  attach:
    args:
      -
        []
      -
        - Storage.Config
    docs: Storage.attach
    text: |-
      Attaches the Storage instance to the global context as `localStorage`.
      If `arg0` is present and `arg0.notebook` is true, it is scoped to the notebook; otherwise, it is scoped to the current cell.
  clear:
    args:
      -
        []
    docs: Storage.clear
    text: |-
      When invoked, will drop underlying **LMDB** database.
  getItem:
    args:
      -
        - String
    docs: Storage.getItem
    text: |-
      When passed a key name, will return that key's value or `null` if key doesn't exist in the storage.
  key:
    args:
      -
        - Number
    docs: Storage.key
    text: |-
      When passed a number `n`, this method will return the name of the nth key in the storage.
      Unlike standard browser implementation, returns nth key with respect to alphabetical order.

      > Complexity: O(n){.warning}
  removeItem:
    args:
      -
        - String
    docs: Storage.removeItem
    text: |-
      When passed a key name, will remove that key from the storage.
  setItem:
    args:
      -
        - String
        - String
      -
        - String
        - Any
    docs: Storage.setItem
    text: |-
      When passed a key name and value, will add that key to the storage, or update that key's value if it already exists.

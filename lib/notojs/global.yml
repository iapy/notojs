      An array of `String` or `ArrayBuffer` elements. If array contains any other type, `TypeError` is thrown.
  - struct: Options
    fields:
      type:
        type: String
        docs: Blob.Options.type
        text: |-
          The MIME type of the data that will be stored into the blob. The default value is the empty string.
    docs: Blob.Options
    text: |-
      An optional object passed as the second argument to the `Blob` constructor.
ctor:
  args:
    -
      - Blob.Parts
    -
      - Blob.Parts
      - Blob.Options
  docs: Blob.constructor
  text: |-
    Constructs `Blob` from parts and optional `Blob.Options` object.
properties:
  size:
    getter: true
    docs: Blob.size
    text: |-
      The size, in bytes, of the data contained in the `Blob` object.
  type:
    getter: true
    setter:
      - String
    docs: Blob.type
    text: |-
      A string indicating the MIME type of the data contained in the `Blob`.
      Empty string represents unknown `Blob` type.
methods:
  arrayBuffer:
    args:
      -
        []
    docs: Blob.arrayBuffer
    text: |-
      Returns a promise that resolves with an `ArrayBuffer` containing the entire contents of the `Blob` as binary data.
  bytes:
    args:
      -
        []
    docs: Blob.bytes
    text: |-
      Returns a promise that resolves with a `Uint8Array` containing the contents of the `Blob`.
  slice:
    args:
      -
        []
      -
        - Number
      -
        - Number
        - Number
      -
        - Number
        - Number
        - String
    docs: Blob.slice
    text: |-
      Returns a new `Blob` object containing the data in the specified range of bytes of the blob on which it's called.
      The returned `Blob` is a view over the original and does not allocate new memory.

      - `arg0` — start index (inclusive), `0` if not present.
      Negative values are offsets from the end.
      - `arg1` — end index (exclusive), `Blob.size` if not present.
      Negative values are offsets from the end.
      - `arg2` — content type for the new `Blob`, empty string if not present.
  text:
    args:
      -
        []
    docs: Blob.text
    text: |-
      Returns a promise that resolves with a string containing the entire contents of the `Blob` interpreted as UTF-8 text.
  toJSON:
    args:
      -
        []
    docs: Blob.toJSON
    text: |-
      Returns object with the following properties:
      - `size` — `Number`, size of the blob in bytes
      - `type` — `String`, MIME type of the blob

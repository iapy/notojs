class: Blob
docs: Blob
text: |-
  The `Blob` interface represents a blob, which is a file-like object of immutable, raw data; they can be read as text or binary data.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/Blob
impl:
  - IBlob
defs:
  - type: Parts
    base: Array
    docs: Blob.Parts

text: |-
  Fetches and executes a legacy **JavaScript** script, then returns an object containing selected values from the script context.

  `arg0` specifies the script source. It may be a `Request`, `Request.HTTPURL`, or `Request.HTTPString`.
  `arg1` specifies which names to capture after the script runs:

  - a string captures one name.
  - an array captures each string item in the array.

  If `arg2` is provided, it is used as an additional lookup context while the script runs. Name lookup first checks the script context, then `arg2`, then the global object.

  The script is evaluated in a legacy `with`-style context. Assignments made by the script are stored in the returned context object, and the selected names from `arg1` are copied into that object before it is returned.

  ```javascript
  const { marked } = await require.script(
    'https://cdn.jsdelivr.net/npm/marked/marked.min.js',
    'marked'
  );

  print(marked.parse('# Hello from a legacy script'));
  ```

  Throws `ReferenceError` if the script cannot be fetched.
  Throws an internal error if the HTTP response status is not `200 OK`.
  Rethrows any exception from the script.

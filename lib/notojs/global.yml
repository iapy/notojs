class: Request
base: ServerRequest
docs: Request
text: |-
  The `Request` interface of the `fetch` API represents a resource request.
  Inherits most methods and properties from its base class, `ServerRequest`.

  Defines the `noto:` URL scheme for the local **NotoJS** HTTP endpoint.

  > Implemented on top of `boost::beast::http::request<boost::beast::http::string_body>`.{.info}

  > Implementation details may differ from browser implementations.{.warning}
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/Request
defs:
  - type: HTTPString
    base: String
    docs: Request.HTTPString
    text: |-
      Must be a valid `http:`, `https:`, or `noto:` URL string.
      If a `global.prefix` is configured in the **NotoJS** configuration, relative path may be used.
      In this case, the `global.prefix` is prepended.
  - type: HTTPURL
    base: URL
    docs: Request.HTTPURL
    text: |-
      Must be valid `http:`, `https:` or `noto:` URL.
  - type: Cache
    base: String
    docs: Request.Cache
    text: |-
      Cache strategy defined as a combination of flags:
      - `read` — read from cache
      - `write` — write response to cache if it has caching headers
      - `check` — revalidate stale cache (implies `read`)
      - `force` — write to cache ignoring response headers
      - `fetch` — always revalidate (implies `read`)

      Named strategies:
      - `default` = `no-store`
      - `force-cache` = `force | read`
      - `no-cache` = `fetch | write`
      - `no-store` = bypass cache
      - `reload` = `write`

      Custom combinations:
      - `read`
      - `write`
      - `check`
      - `force`
      - `read-write` = `read | write`
      - `check-write` = `check | write`
      - `fetch-write` = `fetch | write`
      - `read-force` = `read | force`
      - `check-force` = `check | force`
      - `fetch-force` = `fetch | force`

      HTTP cache is backed by an **LMDB** database `sys:httpdata`, see `doc('topic:lmdb')`.
  - type: Method
    base: String
    docs: Request.Method
    text: |-
      Valid uppercase HTTP method.
  - type: Redirect
    base: String
    docs: Request.Redirect
    text: |-
      One of the following values:
      - `follow` — automatically follow redirects.
      - `error` — reject the promise with a network error when a redirect status is returned.
      - `manual` — return a redirect response.
  - struct: Config
    fields:
      body:
        type:
          Any:
            - String
            - ArrayBuffer
            - Object
        docs: Request.Config.body
        text: |-
          The request body content to send to the server. If `Object`, serialized as JSON and `Content-Type: application/json` header is set.
      headers:
        type:
          Any:
            - Headers
            - Dict:
                - String
        docs: Request.Config.headers
        text: |-
          Any headers you want to add to your request, contained within a `Headers` object or an object literal whose keys are the names of headers and whose values are the header values.
      timeout:
        type: Number
        docs: Request.Config.timeout
        text: |-
          Request timeout in milliseconds. Always present; defaults to 10000 (10 seconds).
      redirect:
        type: Request.Redirect
        docs: Request.Config.redirect
        text: |-
          Determines the behavior in case the server replies with a redirect status; defaults to `follow`.
      method:
        type: Request.Method
        docs: Request.Config.method
        text: |-
          Request method. Defaults to `GET`
      cache:
        type: Request.Cache
        docs: Request.Config.cache
        text: |-
          The cache strategy you want to use for the request; defaults to `default` = `no-store`.
    docs: Request.Config
    text: |-
      Set of options that can be used to configure a `Request`.
ctor:
  args:
    -
      []
    -
      - Request.HTTPString
    -
      - Request.HTTPURL
    -
      - Request.HTTPString
      - Request.Config
    -
      - Request.HTTPURL
      - Request.Config
  docs: Request.constructor
  text: |-
    Creates a new `Request` object using URL and Config object.
properties:
  redirect:
    getter: true
    docs: Request.redirect
    text: |-
      Contains the mode for how redirects are handled.
  url:
    getter: true
    docs: Request.url
    text: |-
      Contains the URL of the request.
---

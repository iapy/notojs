---
class: HTML
text: |-
  Represents an HTML fragment.

  When printed, inserts its content into the cell output.

  Throws `TypeError` when printed if this `HTML` object was constructed from `<html>`, `<head>`, `<title>`, or `<body>` elements of `HTMLDocument`.
also:
  - noto:dom
ctor:
  args:
    -
      - Object
  text: |-
    Creates a new `HTML` object from a configuration object, or creates a copy of an existing `HTML` object.
    The configuration object must have a `data` property of type `String` containing the HTML fragment.
---
class: Image
text: |-
  Represents an image.

  When printed, inserts an `<img>` element into the cell output with `src` set to the instance `data`.
ctor:
  args:
    -
      - Object
  text: |-
    Creates a new `Image` object from a configuration object, or creates a copy of an existing `Image` object.
    The configuration object must have a `data` property of type `String` containing the image URL.
---
class: Markdown
text: |-

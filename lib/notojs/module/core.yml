|-
  `noto:core` provides **NotoJS** rendering primitives and their factory functions.
  Although rendering primitives provide constructors, using the factory functions is recommended.

  ###### Exports
  - `class HTML`
  - `class Image`
  - `class Markdown`
  - `class SVG`
  - `class XML`
  - `function html`
  - `function icon`
  - `function image`
  - `function markdown`
  - `function xml`
---
function: html
args:
  -
    - String
  -
    - HTML
text: |-
  Returns an `HTML` object constructed from a string, or a copy of an existing `HTML` object.
also:
  - HTML
---
function: icon
args:
  -
    - String
text: |-
  Fetches an icon by name.

  Returns a `Promise` that resolves to an `SVG` instance containing the icon from
  `https://api.iconify.design/{arg0}.svg`. All requests to `api.iconify.design` are
  cached in the internal HTTP cache.
also:
  - HTTPData
  - topic:ui
---
function: image
args:
  -
    - String
  -
    - IURL
  -
    - SVG
  -
    - Image
  -
    - IBlob
text: |-
  Returns an `Image` object.

  - If `arg0` is a `String` or `URL`, returns an `Image` object with `arg0` as its `data` property.
  - If `arg0` is an `SVG` or `Image`, returns a copy of `arg0`.
  - If `arg0` is a `Blob`, returns an `Image` object with a `data:` URL as its `data` property.

  Throws `TypeError` if `arg0` is a `String` but is not a valid `data`, `http://` or `https://` `URL`.
also:
  - Image
  - SVG

class: System
docs: System
text: |-
  `System` provides access to databases in the `sys:` and `var:` namespaces.

  It has limited functionality compared to `Database`, supporting only database removal and retrieval of statistics.
defs:
  - type: Name
    base: String
    docs: System.Name
    text: |-
      Used internally, not documented.
properties:
  stat:
    getter: true
    docs: System.stat
    text: |-
      Obtain statistics about current database:

      - `branch_pages` — Number of internal (non-leaf) pages
      - `depth` — Depth (height) of the B-tree
      - `entries` — Number of key/value pairs saved in database
      - `leaf_pages` — Number of leaf pages
      - `overflow_pages` — Number of overflow pages
      - `psize` — Size of a database page. This is the same for all databases.
methods:
  drop:
    args:
      -
        []
    docs: System.drop
    text: |-
      Drops the database.

      > This operation is irreversible. Use with caution.{.warning}
---
class: ErrorLog
base: System
docs: ErrorLog
text: |-
  `ErrorLog` provides access to `sys:errorlog` database.

  The `sys:errorlog` database stores information about errors that occur during automatic execution of notebooks.
properties:
  data:
    getter: true
    docs: ErrorLog.data
    text: |-
      Contains data stored in the database.

      The data is an array of objects with the following fields:
      - `time` — timestamp of when the error occurred
      - `type` — error type (e.g. `ReferenceError`)
      - `where` — name of the notebook that caused the error
      - `stack` — stack trace
      - `data` — additional error object fields (if any)
methods:
  drop:
    args:
      -
        []
      -
        - Number
    docs: ErrorLog.drop
    text: |-
      Drops data from the database.

      - If invoked without arguments, drops all data.
      - If invoked with `arg0`, drops data with `time` less or equal than `arg0`.
---
class: HTTPData
base: System
docs: HTTPData
text: |-
  `HTTPData` provides access to `sys:httpdata` database.
properties:
  data:
    getter: true
    docs: HTTPData.data
    text: |-
      Contains data stored in the database.

      The data is an array of objects with the following fields:
      - `base` — host name of the cached data, including protocol (e.g. `https://cdnjs.cloudflare.com`)
      - `type` — one of:
        - `system` — internal system cache (primarily cached modules)
        - `internal` — internal non-system cache (e.g. icons)
        - `fetch` — responses cached via `fetch`
      - `path` — an object where each key is the **MD5** hash of a URL path and the value is the size of the cached response
methods:
  drop:
    args:
      -
        []
      -
        - String
      -
        - String
        - String
    docs: HTTPData.drop
    text: |-
      Drops data from the database.

      - If invoked without arguments, drops all data.
      - If invoked with one argument `arg0`, drops all data for the specified cache type (`system`, `internal`, or `fetch`).
      - If invoked with two arguments, drops all data for the specified cache type (`arg0`) with base `arg1`.
---
function: backup
args:
  -
    - fs::IPath
docs: backup
text: |-
  Backs up the **LMDB** environment.

  `arg0` must be a `Path` pointing to a non-existent or empty directory.
  Throws `DBException` on error or if `arg0` path is read-only.
---
function: info
args:
  -
    []
docs: info
text: |-
  Returns information about the **LMDB** environment.

  The returned `Object` has the following fields:
  - `last_pgno` — ID of the last used page
  - `last_txnid` — ID of the last committed transaction
  - `mapsize` — size of the data memory map
  - `maxreaders` — maximum number of reader slots
  - `numreaders` — number of reader slots currently in use
---
function: stat
args:
  -
    []
docs: stat
text: |-
  Return statistics about the **LMDB** environment.

  The returned `Object` has the following fields:
  - `branch_pages` — Number of internal (non-leaf) pages
  - `depth` — Depth (height) of the B-tree
  - `entries` — Number of databases in the environment
  - `leaf_pages` — Number of leaf pages
  - `overflow_pages` — Number of overflow pages
  - `psize` — Size of a database page. This is the same for all databases.
---
function: open
args:
  -
    - Tail:
        - 1
        - String
text: |-
  Creates a `Database` instance.

  Accepts a variable number of arguments, each a string representing a database name.

  - If the first argument starts with `sys:` or `var:`, it must be the only argument. In this case, `open` returns:
    - `ErrorLog` for `sys:errorlog`
    - `HTTPData` for `sys:httpdata`
    - `System` for any other value
  - Otherwise, all arguments are treated as database names in the `usr:` namespace, validated against `Database.Name`,
  and `open` returns a `Database` instance.

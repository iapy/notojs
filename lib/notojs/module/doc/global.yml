interface: noto::URL
docs: noto::URL
text: |-
  Represents a *pointer* to JavaScript `URL` object owned by the host runtime.

  ```c++
  JSValue copy(JSContext *ctx, noto::URL url) {
    if(auto u = noto::URL::parse(url->href()); u)
        return noto::URL::make(ctx, std::move(*u));
    return JS_NULL;
  }
  ```
also:
  - URL

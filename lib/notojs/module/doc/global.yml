function: noto::fetch
sign:
  - type: JSValue
    args:
      - JSContext *
      - "boost::beast::http::request<boost::beast::http::string_body> &&"
      - "boost::urls::url &&"
      - "JSValue (*)(JSContext *, JSValue, const boost::beast::http::response<boost::beast::http::string_body> &)"
docs: noto::fetch
text: |-
  Sends a constructed `boost::beast::http::request` to the requested URL and returns a JavaScript `Promise`.
  The callback is invoked for a successful response with the:

  - `JSContext`
  - `JSValue` referencing the JavaScript `Response`
  - reference to the C++ response object

  Callback should return the value promise resolves to.
also:
  - fetch

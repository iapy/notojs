      - JSContext *
      - int
      - JSValue *
docs: noto::clog
text: |-
  Writes one or more JavaScript values to the **NotoJS** server log. The first argument must be a string.
  Returns `undefined`, or thrown a JavaScript exception if the arguments are invalid.

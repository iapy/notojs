interface: noto::Blob
docs: noto::Blob
text: |-
  Represents a *pointer* to JavaScript `Blob` object owned by the host runtime.

  ```c++
  JSValue copy(JSContext *ctx, noto::Blob blob) {
    auto [data, size] = blob->data();
    return noto::Blob::make(ctx, data, size, blob->type());
  }
  ```

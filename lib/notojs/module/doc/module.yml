function: noto::fs::init
sign:
  - type: void
    args:
      - JSContext *
text: |-
  Initializes the current native module with access to the `noto:fs` module.

  > Call this from the native module's `int init(JSContext *, JSModuleDef *)` function before using functions or interfaces declared in the `noto::fs` namespace.{.warning}

function: noto::core::image
sign:
  - type: JSValue
    args:
      - JSContext *
      - "const boost::urls::url &"
  - type: JSValue
    args:
      - JSContext *
      - const std::uint8_t *
      - std::size_t
      - "const std::string &"
docs: noto::core::image
text: |-
  Creates a printable `Image` object from url or binary data.

  ```c++
  JSValue logo(JSContext *ctx) {
    if(auto url = noto::URL::parse(
        'https://github.com/iapy/notojs/blob/main/lib/notojs/bundle/logo.png?raw=true'
    ))
        return noto::core::image(ctx, *url);
    return JS_NULL;
  }
  ```
also:
  - Image

sign:
  - type: JSValue
    args:
      - JSContext *
      - "const std::string &"
docs: noto::core::html
text: |-
  Creates a printable `HTML` object from string source.

  ```c++
  JSValue hello(JSContext *ctx) {
    return noto::core::html(ctx, "<h1>Hello</h1>");
  }
  ```

interface: noto::fs::Path
docs: noto::fs::Path
text: |-
  Represents a *pointer* to JavaScript `Path` object owned by the host runtime.

  ```c++
  JSValue copy(JSContext *ctx, noto::fs::Path path) {
    auto [path, writable] = path->native();
    try {
      return noto::fs::Path::make(ctx, noto::fs::Path::n2v(path));
    } catch(std:::runtime_error const &) {
      return NULL;
    }
  }
  ```
also:
  - Path
methods:
  native:
    sign:
      - type: std::pair<std::filesystem::path, bool>
        args:
          []
    docs: noto::fs::Path.native
    text: |-
      Returns a pair representing the native filesystem path and a boolean indicating whether the path is writable.
statics:
  make:
    sign:
      - type: JSValue
        args:
          - JSContext *
          - "std::filesystem::path &&"
    docs: noto::fs::Path.make
    text: |-
      Creates an returns an instance of `noto::fs.Path` from an absolute *virtual* filesystem path.
      Returns a thrown JavaScript exception if the path is not mounted.
  n2v:
    sign:
      - type: std::filesystem::path
        args:
          - "const std::filesystem::path &"
    docs: noto::fs::Path.n2v
    text: |-
      Converts a native filesystem path to the corresponding mounted virtual **NotoJS** path.
      Throws `std::runtime_error` if `path` is not absolute or cannot be mapped.
  v2n:
    sign:
      - type: std::filesystem::path
        args:
          - "const std::filesystem::path &"
    docs: noto::fs::Path.v2n
    text: |-
      Converts a mounted virtual **NotoJS** path to a native filesystem path.
      Throws `std::runtime_error` if `path` is not absolute or cannot be mapped.

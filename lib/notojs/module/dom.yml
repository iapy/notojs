class: Text
base: Node
docs: Text
text: |-
  Represents text `Node`.

  > Unlike the standard DOM API, `Text` objects cannot be instantiated directly. New text nodes must be created using `Document.createTextNode()`.
  {.warning}
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/Text
---
class: HTMLCollection
docs: HTMLCollection
text: |-
  Represents a *live* or *static* collection of `Element` objects.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/HTMLCollection
properties:
  length:
    getter: true
    docs: HTMLCollection.length
    text: |-
      Contains the number of elements in `this` `HTMLCollection`.
methods:
  "[Symbol.iterator]":
    args:
      -
        []
    docs: HTMLCollection.[Symbol.iterator]
    text: |-
      Returns an iterator over the elements in `this` `HTMLCollection`.
  entries:
    args:
      -
        []
    docs: HTMLCollection.entries
    text: |-
      Returns an iterator over `[index, element]` pairs.
  forEach:
    args:
      -
        - Function
      -
        - Function
        - Any
    docs: HTMLCollection.forEach
    text: |-
      Invokes `arg0` once for each `Element` in `this` `HTMLCollection`.

      If arg1 is provided, it is used as the callback’s this value.
  item:
    args:
      -
        - Number
    docs: HTMLCollection.item
    text: |-
      Returns the `Element` at the specified index `arg0`.

      Returns `null` if `arg0` is out of range.
  keys:
    args:
      -
        []
    docs: HTMLCollection.keys
    text: |-
      Returns an iterator over `this` `HTMLCollection` indices.
  namedItem:
    args:
      -
        - String
    docs: HTMLCollection.namedItem
    text: |-
      Returns the first `Element` whose `id` or `name` attribute matches `arg0`.

      Returns `null` if no matching `Element` is found.
  values:
    args:
      -
        []
    docs: HTMLCollection.values
    text: |-
      Returns an iterator over the elements in `this` `HTMLCollection`.
---
class: Element
base: Node
docs: Element
text: |-
  Represents an element node in a document tree.

  `Element` serves as the base class for HTML, SVG, and XML elements.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/Element
impl:
  - XML::Interface
defs:
  - type: Position
    base: String
    docs: Element.Position
    text: |-
      Represents a position relative to an element.

      Values of this type are accepted by methods such as `Element.insertAdjacentElement()` and `Element.insertAdjacentText()` to specify where content should be inserted.

      The following values are supported:

      | Value | Description |
      |---------|-------------|
      | `"beforebegin"` | Before the element itself. |
      | `"afterbegin"` | Inside the element, before its first child. |
      | `"beforeend"` | Inside the element, after its last child. |
      | `"afterend"` | After the element itself. |
properties:
  attributes:
    getter: true
    docs: Element.attributes
    text: |-
      Contains attribute collection as an `NamedNodeMap`.
  childElementCount:
    getter: true
    docs: Element.childElementCount
    text: |-
      Contains the number of child nodes that are elements.
  children:
    getter: true
    docs: Element.children
    text: |-
      Contains a live `HTMLCollection` containing `this` element’s child elements.
  firstElementChild:
    getter: true
    docs: Element.firstElementChild
    text: |-
      Contains the first child `Element`, or `null` if `this` `Element` has no child elements.
  innerText:
    getter: true
    setter:
      - "Null"
      - Any
    docs: Element.innerText
    text: |-
      Gets or sets the textual content of `this` `Element`. Assigning `null` clears `this` `Element`’s contents.
  lastElementChild:
    getter: true
    docs: Element.lastElementChild
    text: |-
      Contains the last child `Element`, or `null` if `this` `Element` has no child elements.
  nextElementSibling:
    getter: true
    docs: Element.nextElementSibling
    text: |-
      Contains the next sibling that is an `Element`, or `null` if none exists.
  previousElementSibling:
    getter: true
    docs: Element.previousElementSibling
    text: |-
      Contains the previous sibling that is an `Element`, or `null` if none exists.
  tagName:
    getter: true
    docs: Element.tagName
    text: |-
      Contains `this` `Element`'s tag name.
methods:
  after:
    args:
      -
        - Tail:
            - 1
            - Node
            - String
    docs: Element.after
    text: |-
      Inserts the specified nodes or strings immediately after `this` `Element`.
  append:
    args:
      -
        - Tail:
            - 1
            - Node
            - String
    docs: Element.append
    text: |-
      Appends the specified nodes or strings to `this` `Element`.
  before:
    args:
      -
        - Tail:
            - 1
            - Node
            - String
    docs: Element.before
    text: |-
      Inserts the specified nodes or strings immediately before `this` `Element`.
  getAttribute:
    args:
      -
        - String
    docs: Element.getAttribute
    text: |-
      Returns the value of the specified attribute or `null` if the attribute does not exist.
  getAttributeNode:
    args:
      -
        - String
    docs: Element.getAttributeNode
    text: |-
      Returns the specified attribute of `this` `Element`, as an `Attr` node or null if attribute does not exist.
  getElementsByTagName:
    args:
      -
        - String
    docs: Element.getElementsByTagName
    text: |-
      Returns a *static* `NodeList` containing all descendant elements whose tag name matches `arg0`.

      If `arg0` is `"*"`, a *static* `NodeList` all descendant elements is returned.
  hasAttribute:
    args:
      -
        - String
    docs: Element.hasAttribute
    text: |-
      Returns `true` if `this` `Element` has an attribute `arg0` or `false` otherwise.
  insertAdjacentElement:
    args:
      -
        - Element.Position
        - Element
    docs: Element.insertAdjacentElement
    text: |-
      Inserts `arg1` at the position specified by `arg0`.

      Returns `arg1`.

      Throws
      - `TypeError` if `arg0` is not supported `Position`.
      - `DOMException (HierarchyRequestError)` if `arg1` is ancestor of this `Element`.
      - `DOMException (WrongDocumentError)` if `arg0` and this `Element` belong to different documents.
  insertAdjacentText:
    args:
      -
        - Element.Position
        - String
    docs: Element.insertAdjacentText
    text: |-
      Inserts a text node containing `arg1` at the position specified by `arg0`.

      Throws `TypeError` if `arg0` is not supported `Position`.
  moveBefore:
    args:
      -
        - Node
        - "Null"
      -
        - Node
        - Node
    docs: Element.moveBefore
    text: |-
      Moves `arg0` to become a child of this `Element` before `arg1` or to the end of the child list if `arg0` is `null`.
  prepend:
    args:
      -
        - Tail:
            - 1
            - Node
            - String
    docs: Element.prepend
    text: |-
      Prepends the specified nodes or strings to `this` `Element`.
  querySelector:
    args:
      -
        - String
    docs: Element.querySelector
    text: |-
      Returns the first descendant `Element` matching the CSS selector `arg0` or `null` if no matching `Element` is found.

      > When used with XML documents, only a subset of CSS selectors is supported. Selectors that rely on HTML-specific semantics or browser features may not be available.{.warning}
    also:
      - topic:selectors
  querySelectorAll:
    args:
      -
        - String
    docs: Element.querySelectorAll
    text: |-
      Returns a static `NodeList` containing all descendant `Elements` that match the CSS selector `arg0`.

      > When used with XML documents, only a subset of CSS selectors is supported. Selectors that rely on HTML-specific semantics or browser features may not be available.{.warning}
    also:
      - topic:selectors
  remove:
    args:
      -
        []
    docs: Element.remove
    text: |-
      Removes `this` `Element` from its parent.
  removeAttribute:
    args:
      -
        - String
    docs: Element.removeAttribute
    text: |-
      Removes the attribute named `arg0`.
  removeAttributeNode:
    args:
      -
        - Attr
    docs: Element.removeAttributeNode
    text: |-
      Removes the specified `Attr` node and returns it.

      Throws `DOMException (NotFoundError)` if `arg0` isn't an attribute of `this` `Element`.
  replaceChildren:
    args:
      -
        - Tail:
            - 1
            - Node
            - String
    docs: Element.replaceChildren
    text: |-
      Replaces the children of `this` `Element` with the specified nodes or strings.
  setAttribute:
    args:
      -
        - String
        - Any
    docs: Element.setAttribute
    text: |-
      Creates or updates the specified attribute `arg0` with value `arg1`.
  setAttributeNode:
    args:
      -
        - Object
    docs: Element.setAttributeNode
    text: |-
      Associates the specified `Attr` node with `this` `Element`.
      Returns the `Attr` node that was replaced, or `null` if no attribute was replaced.

      Throws
      - `TypeError` if `arg0` is not an `Attr`.
      - `DOMException (WrongDocumentError)` if `arg0` and this `Element` belong to different documents.
  toJSON:
    args:
      -
        []
    docs: Element.toJSON
    text: |-
      Returns a printable `XML` object associated with `this` `Element`. Overriden in `HTMLElement`.
  toString:
    args:
      -
        []
    docs: Element.toString
    text: |-
      Returns the serialized representation of `this` `Element`.
  toggleAttribute:
    args:
      -
        - String
      -
        - String
        - Boolean
    docs: Element.toggleAttribute
    text: |-
      Adds or removes the specified attribute.

      - if `arg1` is omitted, the attribute is toggled.
      - if `arg1` is provided, the attribute is added when `true` and removed when `false`.

      Returns `true` if the attribute is present after the operation; otherwise returns `false`.
---
class: Document
base: Node
docs: Document
text: |-
  Represents a parsed document tree.

  `Document` is the common base class for `HTMLDocument` and `XMLDocument`.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/HTMLElement
methods:
  querySelector:
    args:
      -
        - String
    docs: Document.querySelector
    text: |-
      Returns the first element within `this` `Document` that matches the CSS selector `arg0` or `null` if no matching `Element` is found.

      > When used with XML documents, only a subset of CSS selectors is supported. Selectors that rely on HTML-specific semantics or browser features may not be available.{.warning}
    also:
      - topic:selectors
  querySelectorAll:
    args:
      -
        - String
    docs: Document.querySelectorAll
    text: |-
      Returns a static `NodeList` containing all `Elements` within `this` `Document` that match the CSS selector `arg0`.

      > When used with XML documents, only a subset of CSS selectors is supported. Selectors that rely on HTML-specific semantics or browser features may not be available.{.warning}
    also:
      - topic:selectors
statics:
  html:
    args:
      -
        []
      -
        - String
    docs: Document.html
    text: |-
      Creates and returns a new `HTMLDocument`.

      If `arg0` is provided, it is parsed as HTML and used to populate the `HTMLDocument`.

      Throws `DOMException (SyntaxError)` if parsing fails (very unlikely).
  xml:
    args:
      -
        - String
    docs: Document.xml
    text: |-
      Creates and returns a new `XMLDocument` by parsing arg0 as XML.

      Throws `DOMException (SyntaxError)` if parsing fails.
---
class: XMLDocument
base: Document
docs: XMLDocument
text: |-
  Represents an XML document.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/XMLDocument
impl:
  - XML::Interface
properties:
  documentElement:
    getter: true
    docs: XMLDocument.documentElement
    text: |-
      Returns the root `Element` of `this` `XMLdocument`.
methods:
  createElement:
    args:
      -
        - String
    docs: XMLDocument.createElement
    text: |-
      Creates and returns a new `Element` with the specified tag name.

      The returned `Element` is not automatically inserted into `this` `XMLDocument`.
  createTextNode:
    args:
      -
        - String
    docs: XMLDocument.createTextNode
    text: |-
      Creates and returns a new `Text` node containing the specified text.

      The returned `Text` node is not automatically inserted into `this` `XMLDocument`.
  getElementsByTagName:
    args:
      -
        - String
    docs: XMLDocument.getElementsByTagName
    text: |-
      Returns a *static* `HTMLCollection` containing all elements whose tag name matches `arg0`.

      If `arg0` is `"*"`, a *static* `HTMLCollection` containing all descendant elements is returned.
  toJSON:
    args:
      -
        []
    docs: XMLDocument.toJSON
    text: |-
      Returns a printable `XML` object associated with `this` `XMLDocument`.
  toString:
    args:
      -
        []
    docs: XMLDocument.toString
    text: |-
      Returns the serialized representation of `this` `XMLDocument`.
---
class: DOMStringMap
docs: DOMStringMap
text: |-
  Represents the collection of custom data attributes associated with an `HTMLElement`.

  Instances of this class are typically accessed through the `dataset` property of an `HTMLElement`.

  `DOMStringMap` does not define any explicit properties or methods. Instead, property access is mapped dynamically to the `data-*` attributes:

  * Reading a property returns the value of the corresponding `data-*` attribute.
  * Assigning to a property creates or updates the corresponding `data-*` attribute.
  * Deleting a property removes the corresponding `data-*` attribute.

  For example, `element.dataset.userName` corresponds to the `data-user-name` attribute.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/DOMStringMap
---
class: DOMTokenList
docs: DOMTokenList
text: |-
  Represents an ordered set of space-separated tokens.

  `DOMTokenList` is commonly used by attributes such as `class`, where each token represents an individual value.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/DOMTokenList
properties:
  length:
    getter: true
    docs: DOMTokenList.length
    text: |-
      Contains the number of tokens in `this` `DOMTokenList`.
  value:
    getter: true
    setter:
      - Any
    docs: DOMTokenList.value
    text: |-
      Gets or sets the serialized representation of `this` `DOMTokenList`.
methods:
  add:
    args:
      -
        - Tail:
            - 1
            - Any
    docs: DOMTokenList.add
    text: |-
      Adds one or more tokens to `this` `DOMTokenList`. Tokens that already exist are ignored.
  contains:
    args:
      -
        - Any
    docs: DOMTokenList.contains
    text: |-
      Returns `true` if the specified token exists in the list; otherwise returns `false`.
  entries:
    args:
      -
        []
    docs: DOMTokenList.entries
    text: |-
      Returns an iterator over `[index, token]` pairs.
  forEach:
    args:
      -
        - Function
      -
        - Function
        - Any
    docs: DOMTokenList.forEach
    text: |-
      Invokes `arg0` once for each token in the list.
      If `arg1` is provided, it is used as the callback’s `this` value.
  item:
    args:
      -
        - Number
    docs: DOMTokenList.item
    text: |-
      Returns the token at index `arg0`.

      Returns `null` if `arg0` is out of range.
  keys:
    args:
      -
        []
    docs: DOMTokenList.keys
    text: |-
      Returns an iterator over the token indices.
  remove:
    args:
      -
        - Tail:
            - 1
            - Any
    docs: DOMTokenList.remove
    text: |-
      Removes one or more tokens from `this` `DOMTokenList`. Tokens that do not exist are ignored.
  replace:
    args:
      -
        - Any
        - Any
    docs: DOMTokenList.replace
    text: |-
      Replaces token `arg0` with token `arg1`.

      Returns `true` if the replacement was performed; otherwise returns `false`.
  toString:
    args:
      -
        []
    docs: DOMTokenList.toString
    text: |-
      Returns the serialized representation of `this` `DOMTokenList`. Equivalent to reading the `value` property.
  toggle:
    args:
      -
        - Any
      -
        - Any
        - Boolean
    docs: DOMTokenList.toggle
    text: |-
      Adds or removes a token from `this` `DOMTokenList`.

      If `arg1` is omitted, the token is added if absent and removed if present.

      If `arg1` is provided, the token is added when `arg1` is `true` and removed when `arg1` is `false`.

      Returns `true` if the token is present after the operation; otherwise returns `false`.
  values:
    args:
      -
        []
    docs: DOMTokenList.values
    text: |-
      Returns an iterator over the tokens in `this` `DOMTokenList`.
---
class: CSSRule
docs: CSSRule
text: |-
  Represents a single CSS rule within a stylesheet.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/CSSRule
properties:
  cssText:
    getter: true
    docs: CSSRule.cssText
    text: |-
      Contains the textual representation of this rule.

      > This property is read-only. Unlike the standard DOM API, assigning a new value to `cssText` is not supported.
      {.warning}
  type:
    getter: true
    docs: CSSRule.type
    text: |-
      Returns the type of this rule as a numeric constant. The value identifies the kind of rule represented by this object, such as a style rule, import rule, or media rule.
---
class: CSSRuleList
docs: CSSRuleList
text: |-
  Represents an ordered collection of `CSSRule` objects.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/CSSRuleList
properties:
  length:
    getter: true
    docs: CSSRuleList.length
    text: |-
      Contains the number of rules in the `CSSRuleList`.
methods:
  item:
    args:
      -
        - Number
    docs: CSSRuleList.item
    text: |-
      Returns the `CSSRule` at the specified index `arg0`.
---
class: CSSStyleDeclaration
docs: CSSStyleDeclaration
text: |-
  Base class for CSS declaration objects.

  This class is provided for compatibility with the standard DOM inheritance hierarchy. It does not define any properties or methods of its own.

  All functionality is implemented by `CSSStyleProperties`, which inherits from `CSSStyleDeclaration`.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/CSSStyleDeclaration
---
class: CSSStyleProperties
base: CSSStyleDeclaration
docs: CSSStyleProperties
text: |-
  Represents inline or computed styles available on an `HTMLElement`.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/CSSStyleProperties
properties:
  cssText:
    getter: true
    setter:
      - String
    docs: CSSStyleProperties.cssText
    text: |-
      Gets or sets the serialized CSS declaration block represented by `this` `CSSStyleProperties`.

      For inline styles, assigning to this property replaces all existing declarations with those parsed from the provided string.

      For computed styles, this property is read-only and assigning a value has no effect.
  length:
    getter: true
    docs: CSSStyleProperties.length
    text: |-
      Contains the number of CSS properties currently defined in this declaration block.
methods:
  "[Symbol.iterator]":
    args:
      -
        []
    docs: CSSStyleProperties.[Symbol.iterator]
    text: |-
      Returns an iterator over the names of all defined CSS properties.
  getPropertyPriority:
    args:
      -
        - String
    docs: CSSStyleProperties.getPropertyPriority
    text: |-
      Returns `"important"` if the property is marked with `!important`; otherwise returns an empty string.
  getPropertyValue:
    args:
      -
        - String
    docs: CSSStyleProperties.getPropertyValue
    text: |-
      Returns the value of the specified property or an empty string if the property is not defined.
  item:
    args:
      -
        - Number
    docs: CSSStyleProperties.item
    text: |-
      Returns the name of the property at the specified index. If `arg0` is out of range, returns an empty string.
  removeProperty:
    args:
      -
        - String
    docs: CSSStyleProperties.removeProperty
    text: |-
      Removes the specified property from the declaration block. Returns the property’s previous value, or an empty string if the property was not defined.

      For computed styles, this method has no effect.
  setProperty:
    args:
      -
        - String
        - String
      -
        - String
        - String
        - String
    docs: CSSStyleProperties.setProperty
    text: |-
      Sets the value of the specified property.

      If `arg2` is `"important"`, the property is marked with `!important`. Any other value is ignored.

      For computed styles, this method has no effect.
---
class: CSSStyleSheet
docs: CSSStyleSheet
text: |-
  Represents a CSS stylesheet and provides access to the rules it contains.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/CSSStyleSheet
properties:
  cssRules:
    getter: true
    docs: CSSStyleSheet.cssRules
    text: |-
      Contains a live `CSSRuleList` containing all rules in the stylesheet.
  ownerRule:
    getter: true
    docs: CSSStyleSheet.ownerRule
    text: |-
      Contains `null`.
methods:
  deleteRule:
    args:
      -
        - Number
    docs: CSSStyleSheet.deleteRule
    text: |-
      Removes the rule at the specified index.
  insertRule:
    args:
      -
        - String
      -
        - String
        - Number
    docs: CSSStyleSheet.insertRule
    text: |-
      Parses and inserts the rule specified by `arg0`.

      If `arg1` is provided, the rule is inserted at that index. Otherwise, the rule is appended to the end of the stylesheet.

      Returns the index of the inserted rule.
  replace:
    args:
      -
        - String
    docs: CSSStyleSheet.replace
    text: |-
      Replaces the contents of the stylesheet with the rules parsed from `arg0`.

      Returns a `Promise` that resolves to `this`.
  replaceSync:
    args:
      -
        - String
    docs: CSSStyleSheet.replaceSync
    text: |-
      Replaces the contents of the stylesheet with the rules parsed from `arg0`.
---
class: HTMLElement
base: Element
docs: HTMLElement
text: |-
  Represents an element in an `HTMLDocument`.

  `HTMLElement` extends `Element` and provides HTML-specific functionality, including namespace-aware attribute access, HTML parsing and serialization, CSS styles, classes, and custom data attributes.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/HTMLElement
impl:
  - HTML::Interface
properties:
  attributes:
    getter: true
    docs: HTMLElement.attributes
    text: |-
      Contains attribute collection as an `HTMLNamedNodeMap`.
  classList:
    getter: true
    docs: HTMLElement.classList
    text: |-
      Contains a `DOMTokenList` representing the tokens in `class` attribute.
  className:
    getter: true
    setter:
      - Any
    docs: HTMLElement.className
    text: |-
      Gets or sets the value of the `class` attribute.
  dataset:
    getter: true
    docs: HTMLElement.dataset
    text: |-
      Contains a `DOMStringMap` providing access to `data-*` attributes.
  id:
    getter: true
    setter:
      - Any
    docs: HTMLElement.id
    text: |-
      Gets or sets the value of `id` attribute.
  innerHTML:
    getter: true
    setter:
      - HTML
      - Any
    docs: HTMLElement.innerHTML
    text: |-
      Gets or sets the serialized HTML content of `this` `Element`.
  innerText:
    getter: true
    setter:
      - "Null"
      - Any
    docs: HTMLElement.innerText
    text: |-
      Gets or sets the textual content of `this` `HTMLElement`. Assigning `null` clears `this` `HTMLElement`’s contents.
  outerHTML:
    getter: true
    setter:
      - HTML
      - Any
    docs: HTMLElement.outerHTML
    text: |-
      Gets or sets the serialized HTML representation of `this` `HTMLElement`, including the element itself.
  outerText:
    getter: true
    setter:
      - Any
    docs: HTMLElement.outerText
    text: |-
      Gets or sets the text representation of `this` `HTMLElement`, including the element itself.
  style:
    getter: true
    docs: HTMLElement.style
    text: |-
      Contains a `CSSStyleProperties` object representing the inline styles of `this` `HTMLElement`.
methods:
  after:
    args:
      -
        - Tail:
            - 1
            - Node
            - String
            - HTML
            - Image
            - SVG
    docs: HTMLElement.after
    text: |-
      Inserts the specified nodes, HTML fragments, images, SVG documents, or strings immediately after `this` `HTMLElement`.

      String arguments are converted to text nodes. Arguments are inserted in the order they are provided.
  append:
    args:
      -
        - Tail:
            - 1
            - Node
            - String
            - HTML
            - Image
            - SVG
    docs: HTMLElement.append
    text: |-
      Appends the specified nodes, HTML fragments, images, SVG documents, or strings as children of `this` `HTMLElement`.

      String arguments are converted to text nodes. Arguments are appended in the order they are provided.
  appendChild:
    args:
      -
        - Node
      -
        - Image
      -
        - SVG
    docs: HTMLElement.appendChild
    text: |-
      Appends `arg0` as the last child of `this` `HTMLElement`.

      If `arg0` already belongs to a document tree, it is removed from its current parent before being appended.


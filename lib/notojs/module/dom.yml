      Returns the `Document` that this `Attr` belongs to.
  ownerElement:
    getter: true
    docs: Attr.ownerElement
    text: |-
      Returns the `Element` that this `Attr` belongs to or `null` if this `Attr` is not connected.
  parentElement:
    getter: true
    docs: Attr.parentElement
    text: |-
      Contains `null`.
  parentNode:
    getter: true
    docs: Attr.parentNode
    text: |-
      Contains `null`.
  previousSibling:
    getter: true
    docs: Attr.previousSibling
    text: |-
      Contains `null`.
  textContent:
    getter: true
    setter:
      - String
    docs: Attr.textContent
    text: |-
      Gets or sets the value of this `Attr`.
  value:
    getter: true
    setter:
      - String
    docs: Attr.value
    text: |-
      Gets or sets the value of this `Attr`.
methods:
  appendChild:
    args:
      -
        []
    docs: Attr.appendChild
    text: |-
      Throws `DOMException (HierarchyRequestError)`.
  cloneNode:
    args:
      -
        []
    docs: Attr.cloneNode
    text: |-
      Creates and returns a copy of this attribute.

      The returned attribute is disconnected, has the same namespace, qualified name, and value as `this` attribute.
  compareDocumentPosition:
    args:
      -
        - Attr
      -
        - Node
    docs: Attr.compareDocumentPosition
    text: |-
      Compares the position of this node with `arg0` and returns a bitmask describing their relationship in the document tree.

      If `arg0` is `Attr`, the returned value is a combination of zero or more of the following flags:

      | Value | Constant | Description |
      |---------|----------|-------------|
      | 0x01 | DOCUMENT_POSITION_DISCONNECTED | `this` attribute and `arg0` do not belong to the same document tree. |
      | 0x02 | DOCUMENT_POSITION_PRECEDING | `arg0` precedes `this` attribute in implementation-defined order. |
      | 0x04 | DOCUMENT_POSITION_FOLLOWING | `arg0` follows `this` attribute in implementation-defined order. |
      | 0x10 | DOCUMENT_POSITION_CONTAINED_BY | if `arg0` is an `Element` and `this` is an attribute of `arg0`. |

      If `arg0` is `Node`, the returned value is a result of `this.ownerElement.compareDocumentPosition(this)`.

      Returns 0 if `arg0` is `this` `Attr`.
  contains:
    args:
      -
        - "Null"
      -
        - Node
      -
        - Attr
    docs: Attr.contains

      Returns `false`.
  dispatchEvent:
    args:
      -
        - Event
    docs: Attr.dispatchEvent
    text: |-
      Noop. For compatibility.
  getRootNode:
    args:
      -
        []
    docs: Attr.getRootNode
    text: |-
      Returns `null` if `this` is disconnected and `Element.getRootNode` of `ownerElement` otherwise.
  hasChildNodes:
    args:
      -
        []
    docs: Attr.hasChildNodes
    text: |-
      Returns `false`.
  insertBefore:
    args:
      -
        []
    docs: Attr.insertBefore
    text: |-
      Throws `DOMException (HierarchyRequestError)`.
  isDefaultNamespace:
    args:

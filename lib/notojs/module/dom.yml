text: |-
  `noto:dom` provides a subset of the DOM API for server-side use in **NotoJS**.

  It is intended for compatibility with libraries such as *svg.js* and *D3*, is not necessarily
  standards-compliant and supports parsing and manipulation of HTML and XML documents.

  The implementation of `HTMLDocument` is backed by [lexbor](https://lexbor.com).
  The implementation of `XMLDocument` is backed by [pugixml](https://pugixml.org).

  ###### Exports
  - `class Document`
  - `class DOMParser`
  - `const window = new Window()`
also:
  - https://developer.mozilla.org/en-US/docs/Glossary/DOM
  - topic:dom
---
exception: DOMException
docs: DOMException
text: |-
  DOMException represents an abnormal event that occurs as a result of calling a method or accessing a property of a DOM API.

  Defines the following properties:
  - `code` one of the legacy error code constants
  - `name` string that contains error name
  - `message` string representing a message or description associated with the given error

  `NotoJS` implementation supports the following exception types:
  - `HierarchyRequestError`, `code=3`
  - `WrongDocumentError`, `code=4`
  - `NotFoundError`, `code=8`
  - `SyntaxError`, `code=12`
  - `NamespaceError`, `code=14`
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/DOMException

class: NamedNodeMap
docs: NamedNodeMap
text: |-
  Represents a collection of attribute nodes associated with an `Element`.

  Unlike ordinary JavaScript arrays, `NamedNodeMap` items can be accessed by name and are not guaranteed to be ordered in any particular way.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/NamedNodeMap
properties:
  length:
    getter: true
    docs: NamedNodeMap.length
    text: |-
      Contains the number of `Attr` nodes in `this` `NamedNodeMap`.
methods:
  "[Symbol.iterator]":
    args:
      -
        []
    docs: NamedNodeMap.[Symbol.iterator]
    text: |-
      Returns an iterator over the `Attr` nodes contained in `this` `NamedNodeMap`.
  getNamedItem:
    args:
      -
        - String
    docs: NamedNodeMap.getNamedItem
    text: |-
      Returns the `Attr` node whose name matches `arg0` or `null` if no such node exists.
  item:
    args:
      -
        - Number
    docs: NamedNodeMap.item
    text: |-
      Returns the `Attr` node at the specified index or `null` if `arg0` is out of range.
  removeNamedItem:
    args:
      -
        - String
    docs: NamedNodeMap.removeNamedItem
    text: |-
      Removes and returns the `Attr` node whose name matches `arg0`.

      Throws `DOMException (NotFoundError)` if no such node exists.
  setNamedItem:
    args:
      -
        - Object
    docs: NamedNodeMap.setNamedItem
    text: |-
      Adds the specified node to the map or replaces an existing node with the same name.

      Returns the node that was replaced, or null if no existing node was replaced.

      Throws
      - `TypeError` if `arg0` is not an `Attr`.
      - `DOMException (WrongDocumentError)` if `arg0` and this `NamedNodeMap` belong to different documents.

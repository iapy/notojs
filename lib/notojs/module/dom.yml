        - String
    docs: Attr.isDefaultNamespace
    text: |-
      Returns `true` if this `Attr` belongs to an `HTMLDocument` and `arg0` is `http://www.w3.org/1999/xhtml`.
  isEqualNode:
    args:
      -
        - "Null"
      -
        - Attr
      -
        - Node
    docs: Attr.isEqualNode
    text: |-
      Returns `true` if `arg0` is an `Attr` with the same namespace, qualified name, and value as `this` attribute.
  isSameNode:
    args:
      -
        - "Null"
      -
        - Attr
      -
        - Node
    docs: Attr.isSameNode
    text: |-
      Returns `this === arg0`.
  lookupNamespaceURI:
    args:
      -
        - String
    docs: Attr.lookupNamespaceURI
    text: |-
      Returns `null`.
  lookupPrefix:
    args:
      -
        - String
    docs: Attr.lookupPrefix
    text: |-
      Returns `null`.
  normalize:
    args:
      -
        []
    docs: Attr.normalize
    text: |-
      Noop.
  removeChild:
    args:
      -
        []
    docs: Attr.removeChild
    text: |-
      Throws `DOMException` (`HierarchyRequestError`).
  replaceChild:
    args:

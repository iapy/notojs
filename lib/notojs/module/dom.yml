class: NodeList
docs: NodeList
text: |-
  `NodeList` is live (its contents update as the DOM changes) collection of nodes,
  returned by properties such as `Node.childNodes` and methods such as `Document.querySelectorAll`.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/NodeList
properties:
  length:
    getter: true
    docs: NodeList.length
    text: |-
      The number of nodes in the `NodeList`.
methods:
  "[Symbol.iterator]":
    args:
      -
        []
    docs: NodeList.[Symbol.iterator]
    text: |-
      Returns an iterator allowing code to go through all values (nodes) of the key/value pairs contained in the `NodeList`.
      Equivalent to `NodeList.values`.
  entries:
    args:
      -
        []
    docs: NodeList.entries
    text: |-
      Returns an iterator, allowing code to go through all key/value pairs contained in the `NodeList`.
      The keys are integers starting from 0 and the values are nodes.
  forEach:
    args:
      -
        - Function
      -
        - Function
        - Any
    docs: NodeList.forEach
    text: |-
      Executes a provided callback `arg0` once for each `NodeList` element.

      - `arg0` — function to execute for each element, eventually taking three arguments:
        - `arg0` — the current element being processed in the `NodeList`.
        - `arg1` — the index of the current element being processed in the `NodeList`.
        - `arg2` — the object that `forEach` is being applied to
      - `arg1` — the value of `this` when executing callback
  item:
    args:
      -
        - Number
    docs: NodeList.item
    text: |-
      Returns an item in the `NodeList` by its index `arg0`, or `null` if the index is out-of-bounds.
  keys:
    args:
      -
        []
    docs: NodeList.keys
    text: |-
      Returns an iterator, allowing code to go through all the keys of the key/value pairs contained in the `NodeList`.
      The keys are integers starting from 0.
  values:
    args:
      -
        []
    docs: NodeList.values
    text: |-
      Returns an iterator allowing code to go through all values (nodes) of the key/value pairs contained in the `NodeList`.
      Equivalent to `NodeList.[Symbol.iterator]`.

properties:
  _document:
    getter: true
    docs: Attr._document
    text: |-
      Contains the Document associated with `this` `Node`. Unlike `ownerDocument`, this property may be `null` if the `Document` has been garbage collected.
  childNodes:
    getter: true
    docs: Attr.childNodes
    text: |-
      Contains an empty `NodeList`.
  firstChild:
    getter: true
    docs: Attr.firstChild
    text: |-
      Contains `null`.
  isConnected:
    getter: true
    docs: Attr.isConnected
    text: |-
      A boolean indicating whether or not the `Attr` is connected to the `Element` object.
  lastChild:
    getter: true

class: Node
docs: Node
text: |-
  The `Node` interface represents any node in a `Document`.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/Node
properties:
  _document:
    getter: true
    docs: Node._document
    text: |-
      Contains the Document associated with `this` `Node`. Unlike `ownerDocument`, this property may be `null` if the `Document` has been garbage collected.
  baseURI:
    getter: true
    docs: Node.baseURI
    text: |-
      Contains `String` `about:blank`.
  childNodes:
    getter: true
    docs: Node.childNodes
    text: |-
      Contains a `NodeList` containing all the children of this `Node`.
  firstChild:
    getter: true
    docs: Node.firstChild
    text: |-
      Contains a `Node` representing the first direct child node of this `Node`, or `null` if this `Node` has no children.
  isConnected:
    getter: true
    docs: Node.isConnected
    text: |-
      Contains `true` if this `Node` is connected to its `Document` (i.e. not removed), and `false` otherwise.
  lastChild:
    getter: true
    docs: Node.lastChild
    text: |-
      Contains a `Node` representing the last direct child node of this `Node`, or `null` if this `Node` has no children.
  namespaceURI:
    getter: true
    docs: Node.namespaceURI
    text: |-
      Contains the namespace URI of this `Node`, or `null` if this `Node` belongs to an `XMLDocument`.
  nextSibling:
    getter: true
    docs: Node.nextSibling
    text: |-
      Contains a `Node` representing the next node in the tree, or `null` if there isn't such node.
  nodeName:
    getter: true
    docs: Node.nodeName
    text: |-
      Contains the name of the `Node`:

      - `'#cdata-section'` for CDATA nodes
      - `'#comment'` for comment nodes
      - `'#document'` for `Document`
      - `'#text'` for `Text`
      - `Element.tagName` for `Element`
  nodeType:
    getter: true
    docs: Node.nodeType
    text: |-
      Contains a `Number` representing the type of this `Node`:

      - `1` — `Element`
      - `2` — `Attr`
      - `3` — `Text`
      - `4` — CDATA
      - `7` — processing instruction
      - `8` — comment node
      - `9` — `Document`
      - `10` — `<!DOCTYPE>`
  nodeValue:
    getter: true
    setter:
      - String
    docs: Node.nodeValue
    text: |-
      Gets or sets the value of this `Node`.
  ownerDocument:
    getter: true
    docs: Node.ownerDocument
    text: |-
      Contains `Document` this `Node` belongs to.
  parentElement:
    getter: true
    docs: Node.parentElement
    text: |-
      Contains an `Element` that is the parent of this `Node`, or `null` if there isn't such `Element`.
  parentNode:
    getter: true
    docs: Node.parentNode
    text: |-
      Contains a `Node` that is the parent of this `Node`, or `null` if there isn't such node.
  previousSibling:
    getter: true
    docs: Node.previousSibling
    text: |-
      Contains a `Node` representing the previous node in the tree, or `null` if there isn't such node.
  textContent:
    getter: true
    setter:
      - "Null"
      - Any
    docs: Node.textContent
    text: |-
      Gets or sets the textual content of this `Node`.

      - When accessed, returns textual content of this `Node`.
      - When set, replaces this `Node`’s content with a single `Text` node created from the provided value.
methods:
  appendChild:
    args:
      -
        - Node
    docs: Node.appendChild
    text: |-
      Adds `arg0` to the end of the list of children of this `Node`.

      Throws `DOMException (HierarchyRequestError)` if `arg0` is ancestor of this `Node`.
      Throws `DOMException (WrongDocumentError)` if `arg0` and this `Node` belong to different documents.
  cloneNode:
    args:
      -
        []
      -
        - Boolean
    docs: Node.cloneNode
    text: |-
      Returns a clone of this node. If `arg0` is `true`, the clone includes all of its content.
  compareDocumentPosition:
    args:
      -
        - Attr
      -
        - Node
    docs: Node.compareDocumentPosition
    text: |-
      Compares the position of this node with `arg0` and returns a bitmask describing their relationship in the document tree.

      If `arg0` is `Node`, the returned value is a combination of zero or more of the following flags:

      | Value | Constant | Description |
      |---------|----------|-------------|
      | 0x01 | DOCUMENT_POSITION_DISCONNECTED | The nodes belong to different trees or documents. |
      | 0x02 | DOCUMENT_POSITION_PRECEDING | `arg0` precedes this node in document order. |
      | 0x04 | DOCUMENT_POSITION_FOLLOWING | `arg0` follows this node in document order. |
      | 0x08 | DOCUMENT_POSITION_CONTAINS | `arg0` is an ancestor of this node. |
      | 0x10 | DOCUMENT_POSITION_CONTAINED_BY | `arg0` is a descendant of this node. |
      | 0x20 | DOCUMENT_POSITION_IMPLEMENTATION_SPECIFIC | The relative order is implementation-specific. |

      If `arg0` is `Attr`, the returned value is a combination of zero or more of the following flags:

      | Value | Constant | Description |
      |---------|----------|-------------|
      | 0x01 | DOCUMENT_POSITION_DISCONNECTED | `this` attribute and `arg0` do not belong to the same document tree. |
      | 0x02 | DOCUMENT_POSITION_PRECEDING | `arg0` precedes `this` attribute in implementation-defined order. |
      | 0x04 | DOCUMENT_POSITION_FOLLOWING | `arg0` follows `this` attribute in implementation-defined order. |
      | 0x08 | DOCUMENT_POSITION_CONTAINS | `arg0` is an attribute of `this`. |

      Returns 0 if `arg0` is this node.
  contains:
    args:
      -
        - "Null"
      -
        - Attr
      -
        - Node
    docs: Node.contains
    text: |-
      Returns `true` if `arg0` is descendant of this `Node` and `false` otherwise.
      Returns `false` if `arg0` is `null`.
  dispatchEvent:
    args:
      -
        - Event
    docs: Node.dispatchEvent
    text: |-
      Noop. For compatibility.
  getRootNode:
    args:
      -
        []
    docs: Node.getRootNode
    text: |-
      Returns the topmost ancestor of this node.
  hasChildNodes:
    args:
      -
        []
    docs: Node.hasChildNodes
    text: |-
      Returns `true` if this `Node` has any children and `false` otherwise.
  insertBefore:
    args:
      -
        - Node
        - "Null"
      -
        - Node
        - Node
    docs: Node.insertBefore
    text: |-
      Inserts `arg0` as a child of this node before `arg1`. If `arg1` is `null`, `arg0` is appended by calling `appendChild(arg0)`.

      Returns `arg0`.

      Throws
      - `DOMException (HierarchyRequestError)` if `arg0` is ancestor of this `Node`.
      - `DOMException (NotFoundError)` if `arg1` is not `null` and isn't child of this `Node`.
      - `DOMException (WrongDocumentError)` if `arg0` and this `Node` belong to different documents.
  isDefaultNamespace:
    args:
      -
        - String
    docs: Node.isDefaultNamespace
    text: |-
      Returns `true` if this `Node` belongs to an `HTMLDocument` and `arg0` is `http://www.w3.org/1999/xhtml`.
  isEqualNode:
    args:
      -
        - "Null"
      -
        - Attr
      -
        - Node
    docs: Node.isEqualNode
    text: |-
      Returns `true` if `arg0` is equal to this `Node`.

      Two nodes are considered equal if they have the same type, name, namespace, value, attributes, and equivalent child nodes.
      The nodes do not need to be the same object.

      Returns `false` if `arg0` is null or differs from this `Node` in any of the above properties.
  isSameNode:
    args:
      -
        - "Null"
      -
        - Attr
      -
        - Node
    docs: Node.isSameNode
    text: |-
      Returns `this === arg0`.
  lookupNamespaceURI:
    args:
      -
        - String
    docs: Node.lookupNamespaceURI
    text: |-
      Returns `null`.
  lookupPrefix:
    args:
      -
        - String
    docs: Node.lookupPrefix
    text: |-
      Returns `null`.
  normalize:
    args:
      -
        []
    docs: Node.normalize
    text: |-
      Removes empty text nodes and merges adjacent text nodes into a single text node.
      After normalization, no two text nodes are adjacent within the subtree rooted at this node.
  removeChild:
    args:
      -
        - Node
    docs: Node.removeChild
    text: |-
      Removes child node `arg0` from the DOM and returns the removed `Node`.

      Throws
      - `DOMException (NotFoundError)` if `arg0` is not child of this `Node`.
      - `DOMException (WrongDocumentError)` if `arg0` and this `Node` belong to different documents.
  replaceChild:
    args:
      -
        - Node
        - Node
    docs: Node.replaceChild
    text: |-
      Replaces child `arg1` of `this` Node with `arg0` and returns `arg1`.

      Throws
      - `DOMException (NotFoundError)` if `arg1` is not child of this `Node`.
      - `DOMException (HierarchyRequestError)` if `arg0` is ancestor of this `Node`.
      - `DOMException (WrongDocumentError)` if `arg0` and this `Node` belong to different documents.
---

class: Window
docs: Window
text: |-
  Represents a rendering environment associated with a document.

  > Unlike a browser Window, this implementation provides only a limited subset of the standard API required for DOM, SVG, and styling operations.
  {.warning}
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/Window
defs:
  - struct: Config
    fields:
      notebook:
        type: Boolean
        docs: Window.Config.notebook
        text: |-
          If `true`, the window and document are attached at notebook scope.
    docs: Window.Config
    text: |-
      Configuration object used when attaching a window.
ctor:
  args:
    -
      []
  docs: Window.constructor
  text: |-
    Creates a new `Window` instance.
methods:
  attach:
    args:
      -
        []
      -
        - Window.Config
    docs: Window.attach
    text: |-
      Attaches this window to the current execution environment and exposes it as `globalThis.window`.

      As part of the attachment process, a new `HTMLDocument` is created and exposed as `globalThis.document`.

      If `arg0` is omitted, the window and document are attached to the current cell.

      If `arg0.notebook` is `true`, the window and document are attached at notebook scope and become available to all cells in the notebook. Otherwise, they are available only within the current cell.

      Returns `globalThis.document`.
  getComputedStyle:
    args:
      -
        - HTMLElement
    docs: Window.getComputedStyle
    text: |-
      Returns a `CSSStyleProperties` object representing the computed style of `arg0`.

      The returned object is read-only and reflects the styles currently applied to the element.
---
class: DOMParser
docs: DOMParser
text: |-
  The `DOMParser` provides the ability to parse XML or HTML source code from a string into a `Document`.
also:
  - https://developer.mozilla.org/en-US/docs/Web/API/DOMParser
ctor:
  args:
    -
      []
  docs: DOMParser.constructor
  text: |-
    Creates a `DOMParser`.
methods:
  parseFromString:
    args:
      -
        - String
        - String
    docs: DOMParser.parseFromString
    text: |-
      Parses `arg0` as HTML or XML.

      - `arg0` — HTML or XML string
      - `arg1` — MIME type specifying the parser to use. Supported values:
        - `text/html`, `application/xhtml+xml` — parse as HTML
        - `text/xml`, `application/xml` — parse as XML

      Returns `HTMLDocument` if parsed as HTML, or `XMLDocument` if parsed as XML.

      Throws
      - `TypeError` if `arg1` is not a supported MIME type.
      - `DOMException (SyntaxError)` if parsing fails.
